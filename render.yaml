services:
  - type: web
    name: notification-service
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/notification-service-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_FROM_NAME
        sync: false