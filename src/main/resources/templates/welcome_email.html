<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; padding: 32px; }
        .header { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 16px; }
        .body-text { font-size: 15px; color: #555; line-height: 1.6; }
        .footer { margin-top: 32px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">Welcome aboard 👋</div>
    <div class="body-text">
        <p>Hi <strong th:text="${name}">User</strong>,</p>
        <p>Your account has been created successfully. We're glad to have you.</p>
    </div>
    <div class="footer">This is an automated message. Please do not reply.</div>
</div>
</body>
</html>
